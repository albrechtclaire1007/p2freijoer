<!DOCTYPE html>
<html lang="lb">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
<title>P3 – Bauerenhaff</title>

<style>
@font-face{
  font-family:'Schoulschrëft';
  src:url('https://raw.githubusercontent.com/albrechtclaire1007/schoulschreft/main/schoulschreft_bold%5B2%5D.TTF') format('truetype');
  font-weight:bold;
  font-style:normal;
  font-display:swap;
}

:root{
  --bg1:#E7F5FF;
  --bg2:#CFEAFF;
  --bar:#6FAFE6;
  --barBorder:#4D90CD;
  --ink:#1f1f1f;
  --white:#fff;
  --border:3px;
  --shadow:0 10px 24px rgba(0,0,0,.08);
  --pad:clamp(10px,2.2vw,16px);
  --r:18px;
  --line:#d7e8f7;
  --soft:#ffffff;
  --good:#b8efc8;
  --bad:#ffd6d6;
  --cardBack:url('https://i.postimg.cc/vHSHcbN9/cardback-p3.png');
}

*{
  box-sizing:border-box;
  -webkit-tap-highlight-color:transparent;
  user-select:none;
  outline:none;
}

html,body{
  height:100%;
  margin:0;
  background:linear-gradient(135deg,var(--bg2),var(--bg1));
  color:var(--ink);
  font-family:'Schoulschrëft', Arial, sans-serif;
}

.topBar{
  position:sticky;
  top:10px;
  z-index:10;
  width:min(1200px,96vw);
  margin:10px auto 0;
  background:var(--bar);
  border:var(--border) solid var(--barBorder);
  border-radius:999px;
  box-shadow:var(--shadow);
  padding:10px 12px;
  display:grid;
  grid-template-columns:70px 1fr 70px;
  align-items:center;
  gap:10px;
}

.barBtn{
  border:none;
  background:transparent;
  cursor:pointer;
  display:grid;
  place-items:center;
  width:54px;
  height:54px;
}

.barBtn:active{
  transform:scale(.98);
}

.barBtn img{
  width:46px;
  height:46px;
  object-fit:contain;
}

.barBtn.back img{
  transform:rotate(180deg);
}

.barTitle{
  visibility:hidden;
  height:0;
  margin:0;
}

.wrap{
  width:min(1200px,96vw);
  margin:18px auto 26px;
  padding:var(--pad);
}

.card{
  background:rgba(255,255,255,.8);
  border:var(--border) solid rgba(255,255,255,.65);
  border-radius:var(--r);
  box-shadow:var(--shadow);
  padding:clamp(12px,2.2vw,18px);
  min-height:280px;
}

.gameControls{
  display:flex;
  justify-content:center;
  gap:12px;
  margin-bottom:14px;
}

.gameCtrlBtn{
  border:3px solid var(--line);
  border-radius:16px;
  background:#fff;
  box-shadow:var(--shadow);
  width:72px;
  height:72px;
  display:grid;
  place-items:center;
  cursor:pointer;
}

.gameCtrlBtn:active{
  transform:scale(.98);
}

.gameCtrlBtn img{
  width:48px;
  height:48px;
  object-fit:contain;
}

.choiceGrid{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:14px;
}

.choiceBtn{
  border:3px solid var(--line);
  border-radius:18px;
  background:var(--soft);
  box-shadow:var(--shadow);
  padding:12px;
  cursor:pointer;
  min-height:190px;
  display:flex;
  align-items:center;
  justify-content:center;
}

.choiceBtn:active{
  transform:scale(.98);
}

.choiceBtn img{
  width:100%;
  max-width:180px;
  max-height:145px;
  object-fit:contain;
  display:block;
  margin:0 auto;
}

.memoryGrid{
  display:grid;
  grid-template-columns:repeat(4,minmax(0,1fr));
  gap:12px;
}

.memoryCard{
  min-height:130px;
  border:3px solid var(--line);
  border-radius:18px;
  background:var(--soft);
  box-shadow:var(--shadow);
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:8px;
  color:var(--ink);
  overflow:hidden;
  font-family:'Schoulschrëft', Arial, sans-serif;
  font-size:clamp(1.15rem,2vw,1.45rem);
  line-height:1.15;
}

.memoryCard:active{
  transform:scale(.98);
}

.memoryCard img{
  width:100%;
  max-width:110px;
  max-height:90px;
  object-fit:contain;
}

.memoryCard.back{
  background-image:var(--cardBack);
  background-size:cover;
  background-position:center;
  background-repeat:no-repeat;
}

.memoryCard.back img,
.memoryCard.back .memoryWord{
  display:none;
}

.memoryWord{
  padding:6px;
}

.pluralWrap{
  display:flex;
  flex-direction:column;
  gap:14px;
}

.pluralPrompt{
  display:grid;
  place-items:center;
  padding:8px;
  min-height:180px;
}

.pluralPrompt img{
  width:100%;
  max-width:240px;
  max-height:180px;
  object-fit:contain;
}

.pluralChoices{
  display:grid;
  grid-template-columns:1fr;
  gap:10px;
}

.pluralBtn{
  border:3px solid var(--line);
  border-radius:14px;
  background:#fff;
  padding:12px;
  cursor:pointer;
  font-family:'Schoulschrëft', Arial, sans-serif;
  font-size:clamp(1.2rem,2.7vw,1.8rem);
  color:var(--ink);
}

.good{
  background:var(--good) !important;
}

.bad{
  background:var(--bad) !important;
}

.hidden{
  display:none !important;
}

@media (max-width:900px){
  .choiceGrid{
    grid-template-columns:repeat(3,minmax(0,1fr));
  }

  .memoryGrid{
    grid-template-columns:repeat(3,minmax(0,1fr));
  }
}

@media (max-width:760px){
  .choiceGrid{
    grid-template-columns:repeat(2,minmax(0,1fr));
  }

  .memoryGrid{
    grid-template-columns:repeat(2,minmax(0,1fr));
  }
}

@media (max-width:520px){
  .choiceGrid,
  .memoryGrid{
    grid-template-columns:repeat(2,minmax(0,1fr));
  }

  .choiceBtn{
    min-height:150px;
  }

  .gameCtrlBtn{
    width:64px;
    height:64px;
  }

  .gameCtrlBtn img{
    width:42px;
    height:42px;
  }
}
</style>
</head>

<body>
<div class="topBar">
  <button class="barBtn back" id="prev" aria-label="Virdrun">
    <img src="https://i.postimg.cc/QBYTSN08/p3arrow.png" alt="" />
  </button>

  <h1 class="barTitle">.</h1>

  <button class="barBtn" id="next" aria-label="Nächst">
    <img src="https://i.postimg.cc/QBYTSN08/p3arrow.png" alt="" />
  </button>
</div>

<div class="wrap">
  <div class="card">
    <div id="gameArea"></div>
  </div>
</div>

<script>
const AUDIO_BASE = 'https://github.com/albrechtclaire1007/p3bauerenhaff/raw/refs/heads/main/';

const ITEMS = [
  { id:'bauer', singular:'de Bauer', plural:'zwee Baueren', img:'https://i.postimg.cc/Z0dNtv6g/bauer.png', audio:'BAUER.mp3' },
  { id:'iesel', singular:'den Iesel', plural:'zwee Ieselen', img:'https://i.postimg.cc/R3nqzcwx/iesel.png', audio:'IESEL.mp3' },
  { id:'int', singular:'d’Int', plural:'zwou Inten', img:'https://i.postimg.cc/8FrsVhLP/int.png', audio:'INT.mp3' },
  { id:'kou', singular:'d’Kou', plural:'zwou Kéi', img:'https://i.postimg.cc/Fd5zF7xR/kou.png', audio:'KOU.mp3' },
  { id:'geess', singular:'d’Geess', plural:'zwou Geessen', img:'https://i.postimg.cc/PC7Nc6pp/gees.png', audio:'GEESS.mp3' },
  { id:'hong', singular:'d’Hong', plural:'zwee Hénger', img:'https://i.postimg.cc/R3nqzcwC/hong.png', audio:'HONG.mp3' },
  { id:'jippelchen', singular:'d’Jippelchen', plural:'zwee Jippelcher', img:'https://i.postimg.cc/phbrVpBN/jippelchen.png', audio:'JIPPELCHEN.mp3' },
  { id:'kallef', singular:'d’Kallef', plural:'zwee Källef', img:'https://i.postimg.cc/R65hCNTZ/kallef.png', audio:'KALLEF.mp3' },
  { id:'schof', singular:'d’Schof', plural:'zwee Schof', img:'https://i.postimg.cc/jwH5Dt89/schof.png', audio:'SCHOF.mp3' },
  { id:'lammchen', singular:'d’Lämmchen', plural:'zwee Lämmercher', img:'https://i.postimg.cc/zbZvDVkR/lammchen.png', audio:'LAMMCHEN.mp3' },
  { id:'paerd', singular:'d’Päerd', plural:'zwee Päerd', img:'https://i.postimg.cc/R67FW4Ps/paerd.png', audio:'PAERD.mp3' },
  { id:'fillen', singular:'d’Fillen', plural:'zwee Fillen', img:'https://i.postimg.cc/5YwfpJCW/fillen.png', audio:'FILLEN.mp3' },
  { id:'schwain', singular:'d’Schwäin', plural:'zwee Schwäin', img:'https://i.postimg.cc/ZqCrfXHF/schwain.png', audio:'SCHWAIN.mp3' },
  { id:'fierkel', singular:'d’Fierkel', plural:'zwee Fierkelen', img:'https://i.postimg.cc/FdjhGvJw/fiekel.png', audio:'FIERKEL.mp3' }
];

const gameArea = document.getElementById('gameArea');
const prevBtn = document.getElementById('prev');
const nextBtn = document.getElementById('next');

let currentGame = 0;
let audio = null;

let listenOrder = [];
let listenIndex = 0;
let listenLocked = false;

let memoryCards = [];
let memoryFirst = null;
let memorySecond = null;
let memoryLocked = false;

let pluralOrder = [];
let pluralIndex = 0;
let pluralLocked = false;

function shuffle(arr){
  const a = [...arr];
  for(let i = a.length - 1; i > 0; i--){
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function stopAudio(){
  if(audio){
    audio.pause();
    audio.currentTime = 0;
  }
}

function playAudio(file){
  stopAudio();
  audio = new Audio(AUDIO_BASE + file);
  audio.play().catch(() => {});
}

function updateTopBar(){
  prevBtn.style.opacity = currentGame === 0 ? '.45' : '1';
  nextBtn.style.opacity = currentGame === 2 ? '.45' : '1';
}

function initListenGame(){
  listenOrder = shuffle(ITEMS);
  listenIndex = 0;
  listenLocked = false;
}

function currentListenItem(){
  return listenOrder[listenIndex];
}

function renderListenGame(){
  const item = currentListenItem();

  if(!item){
    currentGame = 1;
    renderCurrentGame();
    return;
  }

  listenLocked = false;

  let html = '';
  html += '<div class="gameControls">';
  html += '<button class="gameCtrlBtn" id="gamePlay" aria-label="Play"><img src="https://i.postimg.cc/ZB9yQkMt/p3play.png" alt="" /></button>';
  html += '<button class="gameCtrlBtn" id="gameReplay" aria-label="Replay"><img src="https://i.postimg.cc/ft30P4rQ/p3replay.png" alt="" /></button>';
  html += '</div>';
  html += '<div class="choiceGrid">';

  ITEMS.forEach(choice => {
    html += `<button class="choiceBtn" data-id="${choice.id}"><img src="${choice.img}" alt="" /></button>`;
  });

  html += '</div>';
  gameArea.innerHTML = html;

  document.getElementById('gamePlay').onclick = function(){
    playAudio(item.audio);
  };

  document.getElementById('gameReplay').onclick = function(){
    playAudio(item.audio);
  };

  gameArea.querySelectorAll('.choiceBtn').forEach(btn => {
    btn.onclick = function(){
      if(listenLocked) return;

      const pickedId = btn.getAttribute('data-id');

      if(pickedId === item.id){
        listenLocked = true;
        btn.classList.add('good');
        setTimeout(function(){
          listenIndex++;
          if(listenIndex >= listenOrder.length){
            currentGame = 1;
          }
          renderCurrentGame();
        }, 450);
      }else{
        btn.classList.add('bad');
        setTimeout(function(){
          btn.classList.remove('bad');
        }, 350);
      }
    };
  });

  setTimeout(function(){
    if(currentGame === 0 && currentListenItem() && currentListenItem().id === item.id){
      playAudio(item.audio);
    }
  }, 150);
}

function initMemoryGame(){
  const cards = [];

  ITEMS.forEach(item => {
    cards.push({
      uid:'img-' + item.id,
      pair:item.id,
      kind:'img',
      img:item.img,
      text:item.singular,
      audio:item.audio,
      open:false,
      matched:false
    });

    cards.push({
      uid:'word-' + item.id,
      pair:item.id,
      kind:'word',
      img:item.img,
      text:item.singular,
      audio:item.audio,
      open:false,
      matched:false
    });
  });

  memoryCards = shuffle(cards);
  memoryFirst = null;
  memorySecond = null;
  memoryLocked = false;
}

function renderMemoryGame(){
  const allMatched = memoryCards.length > 0 && memoryCards.every(card => card.matched);

  if(allMatched){
    initMemoryGame();
  }

  let html = '<div class="memoryGrid">';

  memoryCards.forEach(card => {
    const isOpen = card.open || card.matched;
    let inside = '';

    if(isOpen){
      inside = card.kind === 'img'
        ? `<img src="${card.img}" alt="" />`
        : `<div class="memoryWord">${card.text}</div>`;
    }else{
      inside = '<img src="https://i.postimg.cc/vHSHcbN9/cardback-p3.png" alt="" />';
    }

    html += `<button class="memoryCard ${isOpen ? '' : 'back'} ${card.matched ? 'good' : ''}" data-uid="${card.uid}">${inside}</button>`;
  });

  html += '</div>';
  gameArea.innerHTML = html;

  gameArea.querySelectorAll('.memoryCard').forEach(btn => {
    btn.onclick = function(){
      if(memoryLocked) return;

      const card = memoryCards.find(c => c.uid === btn.getAttribute('data-uid'));
      if(!card || card.open || card.matched) return;

      card.open = true;

      if(card.kind === 'word'){
        playAudio(card.audio);
      }

      if(memoryFirst === null){
        memoryFirst = card;
        renderMemoryGame();
        return;
      }

      memorySecond = card;
      memoryLocked = true;
      renderMemoryGame();

      const isMatch = memoryFirst.pair === memorySecond.pair && memoryFirst.kind !== memorySecond.kind;

      if(isMatch){
        setTimeout(function(){
          memoryFirst.matched = true;
          memorySecond.matched = true;
          memoryFirst = null;
          memorySecond = null;
          memoryLocked = false;
          renderMemoryGame();
        }, 450);
      }else{
        setTimeout(function(){
          memoryFirst.open = false;
          memorySecond.open = false;
          memoryFirst = null;
          memorySecond = null;
          memoryLocked = false;
          renderMemoryGame();
        }, 700);
      }
    };
  });
}

function buildWrongPlurals(item){
  const correct = item.plural;
  const clean = correct.replace(/^zwee\s+|^zwou\s+/, '').trim();
  const article = correct.startsWith('zwou ') ? 'zwou ' : 'zwee ';
  const wrongs = new Set();

  function add(form){
    if(form && form !== correct){
      wrongs.add(form);
    }
  }

  if(article === 'zwou '){
    add('zwou ' + clean + 'en');
    add('zwou ' + clean + 'er');
    add('zwou ' + clean + 's');
    add('zwee ' + clean);
  }else{
    add('zwee ' + clean + 'en');
    add('zwee ' + clean + 'er');
    add('zwee ' + clean + 's');
    add('zwee ' + clean);
  }

  if(clean.endsWith('en')){
    add(article + clean.slice(0, -2));
    add(article + clean.replace(/en$/, 'er'));
  }

  if(clean.endsWith('er')){
    add(article + clean + 'en');
    add(article + clean.replace(/er$/, 'en'));
  }

  if(clean.includes('ä')){
    add(article + clean.replace(/ä/g, 'a'));
  }

  if(clean.includes('é')){
    add(article + clean.replace(/é/g, 'e'));
  }

  if(clean === 'Kéi'){
    add('zwou Kouen');
    add('zwou Kéien');
  }

  if(clean === 'Hénger'){
    add('zwee Hongen');
    add('zwee Honger');
  }

  if(clean === 'Källef'){
    add('zwee Kallefen');
    add('zwee Kallefer');
  }

  if(clean === 'Lämmercher'){
    add('zwee Lämmchen');
    add('zwee Lämmerchen');
  }

  if(clean === 'Jippelcher'){
    add('zwee Jippelchen');
    add('zwee Jippelcheren');
  }

  if(clean === 'Fierkelen'){
    add('zwee Fierkeler');
    add('zwee Fierkel');
  }

  if(clean === 'Baueren'){
    add('zwee Bauers');
    add('zwee Baueren');
  }

  if(clean === 'Ieselen'){
    add('zwee Ieseler');
    add('zwee Iesel');
  }

  if(clean === 'Geessen'){
    add('zwou Geesser');
    add('zwou Geess');
  }

  if(clean === 'Inten'){
    add('zwou Inter');
    add('zwou Int');
  }

  if(clean === 'Päerd'){
    add('zwee Päerder');
    add('zwee Paerden');
  }

  if(clean === 'Fillen'){
    add('zwee Filler');
    add('zwee Fillens');
  }

  if(clean === 'Schwäin'){
    add('zwee Schwäinen');
    add('zwee Schwäiner');
  }

  if(clean === 'Schof'){
    add('zwee Schofer');
    add('zwee Schofen');
  }

  const result = Array.from(wrongs).slice(0, 2);

  while(result.length < 2){
    result.push(article + clean + (result.length === 0 ? 'en' : 'er'));
  }

  return result;
}

function initPluralGame(){
  pluralOrder = shuffle(ITEMS.map(item => {
    const wrong = buildWrongPlurals(item);
    const options = shuffle([item.plural, ...wrong]);
    return { ...item, options };
  }));
  pluralIndex = 0;
  pluralLocked = false;
}

function renderPluralGame(){
  const item = pluralOrder[pluralIndex];

  if(!item){
    initPluralGame();
    return renderPluralGame();
  }

  pluralLocked = false;

  let html = '<div class="pluralWrap">';
  html += `<div class="pluralPrompt"><img src="${item.img}" alt="" /></div>`;
  html += '<div class="pluralChoices">';
  item.options.forEach(opt => {
    html += `<button class="pluralBtn" data-value="${opt}">${opt}</button>`;
  });
  html += '</div></div>';

  gameArea.innerHTML = html;

  gameArea.querySelectorAll('.pluralBtn').forEach(btn => {
    btn.onclick = function(){
      if(pluralLocked) return;

      const value = btn.getAttribute('data-value');

      if(value === item.plural){
        pluralLocked = true;
        btn.classList.add('good');
        setTimeout(function(){
          pluralIndex++;
          if(pluralIndex >= pluralOrder.length){
            initPluralGame();
          }
          renderPluralGame();
        }, 550);
      }else{
        btn.classList.add('bad');
        setTimeout(function(){
          btn.classList.remove('bad');
        }, 450);
      }
    };
  });
}

function renderCurrentGame(){
  stopAudio();
  updateTopBar();

  if(currentGame === 0){
    renderListenGame();
  }else if(currentGame === 1){
    renderMemoryGame();
  }else{
    renderPluralGame();
  }
}

prevBtn.onclick = function(){
  if(currentGame === 0) return;
  currentGame--;
  renderCurrentGame();
};

nextBtn.onclick = function(){
  if(currentGame === 2) return;
  currentGame++;
  renderCurrentGame();
};

initListenGame();
initMemoryGame();
initPluralGame();
renderCurrentGame();
</script>
</body>
</html>
